<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اطلب وجبتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:   #E63946;
    --brand2:  #FF6B35;
    --dark:    #1a1a2e;
    --card:    #16213e;
    --surface: #0f3460;
    --text:    #eaeaea;
    --muted:   #9ba3b4;
    --radius:  14px;
    --shadow:  0 8px 32px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand2) 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(230,57,70,.4);
  }
  header h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; }
  header span { font-size: 1rem; opacity: .85; }

  #cart-btn {
    background: rgba(255,255,255,.2);
    border: 2px solid rgba(255,255,255,.4);
    color: white;
    padding: 10px 18px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    backdrop-filter: blur(8px);
    transition: all .25s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #cart-btn:hover { background: rgba(255,255,255,.35); transform: scale(1.04); }
  #cart-count {
    background: white;
    color: var(--brand);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
    font-weight: 900;
  }

  /* ── CATEGORIES BAR ─────────────────────── */
  #categories-bar {
    display: flex;
    gap: 10px;
    padding: 18px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  #categories-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    white-space: nowrap;
    padding: 8px 20px;
    border-radius: 50px;
    background: rgba(255,255,255,.07);
    border: 1.5px solid rgba(255,255,255,.1);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    transition: all .2s;
  }
  .cat-chip:hover, .cat-chip.active {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
  }

  /* ── MAIN LAYOUT ────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ── SEARCH ─────────────────────────────── */
  #search-box {
    width: 100%;
    padding: 14px 20px;
    border-radius: var(--radius);
    border: 1.5px solid rgba(255,255,255,.12);
    background: var(--card);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    margin-bottom: 28px;
    outline: none;
    transition: border-color .2s;
  }
  #search-box:focus { border-color: var(--brand); }
  #search-box::placeholder { color: var(--muted); }

  /* ── MENU GRID ──────────────────────────── */
  #menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .menu-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.07);
    transition: transform .25s, box-shadow .25s;
    cursor: pointer;
    animation: fadeUp .4s ease both;
  }
  .menu-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow);
    border-color: rgba(230,57,70,.4);
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
  }
  .card-body { padding: 16px; }
  .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: .85rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-price {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--brand2);
  }
  .add-btn {
    background: var(--brand);
    color: white;
    border: none;
    padding: 9px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    transition: all .2s;
  }
  .add-btn:hover { background: #c62d39; transform: scale(1.05); }

  /* ── EMPTY / LOADER ─────────────────────── */
  #loader, #empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1.1rem;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,.1);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CART SIDEBAR ───────────────────────── */
  #cart-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  #cart-overlay.open { display: block; }

  #cart-sidebar {
    position: fixed;
    top: 0; left: -100%;
    width: min(420px, 96vw);
    height: 100vh;
    background: var(--card);
    z-index: 300;
    display: flex;
    flex-direction: column;
    transition: left .35s cubic-bezier(.4,0,.2,1);
    box-shadow: 8px 0 40px rgba(0,0,0,.6);
  }
  #cart-sidebar.open { left: 0; }

  .cart-header {
    padding: 22px 20px;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-header h2 { font-size: 1.2rem; font-weight: 800; }
  #close-cart {
    background: rgba(255,255,255,.2);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  #close-cart:hover { background: rgba(255,255,255,.35); }

  #cart-items { flex: 1; overflow-y: auto; padding: 16px; }

  .cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: rgba(255,255,255,.05);
    border-radius: 10px;
    margin-bottom: 10px;
    gap: 10px;
  }
  .cart-item-name { font-weight: 700; font-size: .95rem; }
  .cart-item-price { color: var(--brand2); font-size: .9rem; margin-top: 3px; }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    background: var(--surface);
    border: none;
    color: white;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .qty-btn:hover { background: var(--brand); }
  .qty-num { font-weight: 700; min-width: 20px; text-align: center; }

  .cart-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .cart-empty .icon { font-size: 3rem; margin-bottom: 12px; }

  .cart-footer {
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,.1);
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .total-price { color: var(--brand2); font-size: 1.3rem; }

  #checkout-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .25s;
  }
  #checkout-btn:hover { opacity: .9; transform: scale(1.02); }

  /* ── ORDER FORM MODAL ───────────────────── */
  #order-modal {
    display: none;
    position: fixed; inset: 0;
    z-index: 400;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #order-modal.open { display: flex; }

  .modal-box {
    background: var(--card);
    border-radius: 20px;
    width: min(480px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    border: 1.5px solid rgba(255,255,255,.1);
    box-shadow: var(--shadow);
    animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(.85); }
    to   { opacity:1; transform: scale(1); }
  }

  .modal-header {
    padding: 22px 24px;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    border-radius: 18px 18px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { font-size: 1.15rem; font-weight: 800; }
  #close-modal {
    background: rgba(255,255,255,.2);
    border: none;
    color: white;
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-body { padding: 24px; }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: .9rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 7px;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,.1);
    background: var(--dark);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--brand); }
  select option { background: var(--dark); }

  .order-type-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .type-btn {
    padding: 12px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,.1);
    background: transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .type-btn.active, .type-btn:hover {
    border-color: var(--brand);
    color: white;
    background: rgba(230,57,70,.15);
  }

  #submit-order {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    transition: all .25s;
  }
  #submit-order:hover { opacity: .9; }
  #submit-order:disabled { opacity: .6; cursor: not-allowed; }

  /* ── SUCCESS SCREEN ─────────────────────── */
  #success-screen {
    display: none;
    position: fixed; inset: 0;
    z-index: 500;
    background: var(--dark);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
  }
  #success-screen.open { display: flex; }
  .success-icon { font-size: 5rem; margin-bottom: 24px; animation: bounce .6s ease; }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }
  #success-screen h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; }
  #success-screen p  { color: var(--muted); font-size: 1rem; margin-bottom: 8px; }
  #order-number { color: var(--brand2); font-size: 1.3rem; font-weight: 800; }

  #new-order-btn {
    margin-top: 30px;
    padding: 14px 36px;
    background: var(--brand);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
  }
  #new-order-btn:hover { transform: scale(1.05); }

  /* ── TOAST ──────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d2d2d;
    color: white;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: .9rem;
    font-weight: 700;
    z-index: 999;
    transition: transform .3s, opacity .3s;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { background: #2a9d3d; }
  #toast.error   { background: var(--brand); }

  /* ── RESPONSIVE ─────────────────────────── */
  @media (max-width: 600px) {
    main { padding: 18px 14px; }
    #menu-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <h1>🍽️ مطعمنا</h1>
    <span id="location-name">جارٍ التحميل...</span>
  </div>
  <button id="cart-btn" onclick="toggleCart()">
    🛒 السلة
    <div id="cart-count">0</div>
  </button>
</header>

<!-- CATEGORIES -->
<div id="categories-bar">
  <button class="cat-chip active" data-cat="all" onclick="filterCategory('all', this)">الكل</button>
</div>

<!-- MAIN -->
<main>
  <input type="text" id="search-box" placeholder="🔍  ابحث عن وجبتك..." oninput="filterSearch()">

  <div id="loader">
    <div class="spinner"></div>
    جارٍ تحميل القائمة...
  </div>

  <div id="menu-grid" style="display:none"></div>
  <div id="empty-state" style="display:none">لم يتم العثور على أصناف 😕</div>
</main>

<!-- CART SIDEBAR -->
<div id="cart-overlay" onclick="toggleCart()"></div>
<div id="cart-sidebar">
  <div class="cart-header">
    <h2>🛒 سلة الطلبات</h2>
    <button id="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div id="cart-items">
    <div class="cart-empty">
      <div class="icon">🛒</div>
      <p>سلتك فارغة</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>الإجمالي:</span>
      <span class="total-price" id="cart-total-price">0.00 ₪</span>
    </div>
    <button id="checkout-btn" onclick="openOrderModal()">تأكيد الطلب ←</button>
  </div>
</div>

<!-- ORDER FORM MODAL -->
<div id="order-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>📋 تفاصيل الطلب</h2>
      <button id="close-modal" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label>نوع الطلب</label>
        <div class="order-type-btns">
          <button class="type-btn active" onclick="setOrderType('collection', this)">🏃 استلام من الفرع</button>
          <button class="type-btn" onclick="setOrderType('delivery', this)">🚗 توصيل</button>
        </div>
      </div>

      <div class="form-group">
        <label>الاسم الأول *</label>
        <input type="text" id="f-firstname" placeholder="أحمد">
      </div>

      <div class="form-group">
        <label>اسم العائلة</label>
        <input type="text" id="f-lastname" placeholder="محمد">
      </div>

      <div class="form-group">
        <label>رقم الهاتف *</label>
        <input type="tel" id="f-phone" placeholder="07XXXXXXXX">
      </div>

      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="f-email" placeholder="example@email.com">
      </div>

      <div class="form-group" id="address-group" style="display:none">
        <label>عنوان التوصيل</label>
        <input type="text" id="f-address" placeholder="الحي، الشارع، رقم المنزل">
      </div>

      <div class="form-group">
        <label>ملاحظات إضافية</label>
        <textarea id="f-comment" rows="3" placeholder="أي طلبات خاصة؟"></textarea>
      </div>

      <button id="submit-order" onclick="submitOrder()">🍽️ أرسل الطلب</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <h2>تم استلام طلبك!</h2>
  <p>رقم طلبك:</p>
  <div id="order-number">#----</div>
  <p style="margin-top:12px">سيتم التواصل معك قريباً 🙏</p>
  <button id="new-order-btn" onclick="resetAll()">طلب جديد</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
// غيّر هذا الرابط ليشير لمجلدك على السيرفر
const API_BASE = './api_handler.php';

// ─── STATE ─────────────────────────────────────────────────────
let allMenuItems = [];
let cart = [];
let orderType = 'collection';
let currentCategory = 'all';

// ─── INIT ───────────────────────────────────────────────────────
(async function init() {
  await Promise.all([loadCategories(), loadMenus()]);
  loadLocations();
})();

// ─── LOAD MENUS ─────────────────────────────────────────────────
async function loadMenus() {
  try {
    const res = await fetch(`${API_BASE}?action=get_menus`);
    const json = await res.json();

    document.getElementById('loader').style.display = 'none';
    document.getElementById('menu-grid').style.display = 'grid';

    if (json.success && json.data?.length) {
      allMenuItems = json.data;
      renderMenus(allMenuItems);
    } else {
      // demo fallback إذا ما اشتغل API بعد
      allMenuItems = demoItems();
      renderMenus(allMenuItems);
    }
  } catch(e) {
    document.getElementById('loader').style.display = 'none';
    allMenuItems = demoItems();
    document.getElementById('menu-grid').style.display = 'grid';
    renderMenus(allMenuItems);
  }
}

// ─── LOAD CATEGORIES ────────────────────────────────────────────
async function loadCategories() {
  try {
    const res = await fetch(`${API_BASE}?action=get_categories`);
    const json = await res.json();
    if (json.success && json.data?.length) {
      const bar = document.getElementById('categories-bar');
      json.data.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-chip';
        btn.dataset.cat = cat.id;
        btn.textContent = cat.attributes?.name || cat.name;
        btn.onclick = () => filterCategory(cat.id, btn);
        bar.appendChild(btn);
      });
    }
  } catch(e) {}
}

// ─── LOAD LOCATIONS ─────────────────────────────────────────────
async function loadLocations() {
  try {
    const res = await fetch(`${API_BASE}?action=get_locations`);
    const json = await res.json();
    if (json.success && json.data?.[0]) {
      const loc = json.data[0];
      const name = loc.attributes?.location_name || loc.name || 'المطعم';
      document.getElementById('location-name').textContent = name;
    }
  } catch(e) {
    document.getElementById('location-name').textContent = 'المطعم';
  }
}

// ─── RENDER ─────────────────────────────────────────────────────
const FOOD_EMOJIS = ['🍔','🍕','🍗','🥗','🌮','🍜','🥪','🍣','🥩','🍱'];

function renderMenus(items) {
  const grid = document.getElementById('menu-grid');
  const empty = document.getElementById('empty-state');

  if (!items.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  grid.style.display = 'grid';

  grid.innerHTML = items.map((item, i) => {
    const attr = item.attributes || item;
    const name  = attr.menu_name || attr.name || 'صنف';
    const desc  = attr.menu_description || attr.description || '';
    const price = parseFloat(attr.menu_price || attr.price || 0).toFixed(2);
    const imgUrl = attr.thumb ?? attr.image ?? '';
    const id    = item.id ?? item.menu_id ?? i;
    const emoji = FOOD_EMOJIS[i % FOOD_EMOJIS.length];

    const imgTag = imgUrl
      ? `<img src="${imgUrl}" alt="${name}" style="width:100%;height:180px;object-fit:cover">`
      : `<div class="card-img">${emoji}</div>`;

    return `
      <div class="menu-card" style="animation-delay:${i*0.05}s">
        ${imgTag}
        <div class="card-body">
          <div class="card-name">${name}</div>
          <div class="card-desc">${desc || 'وجبة شهية مميزة'}</div>
          <div class="card-footer">
            <div class="card-price">${price} ₪</div>
            <button class="add-btn" onclick="addToCart(${JSON.stringify(JSON.stringify({id,name,price}))})">+ أضف</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── FILTER ─────────────────────────────────────────────────────
function filterCategory(catId, btn) {
  currentCategory = catId;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let filtered = allMenuItems;
  if (catId !== 'all') {
    filtered = allMenuItems.filter(item => {
      const attr = item.attributes || item;
      return String(attr.category_id ?? attr.menu_category_id) === String(catId);
    });
  }
  const search = document.getElementById('search-box').value.toLowerCase();
  if (search) filtered = filtered.filter(i => (i.attributes?.menu_name||i.name||'').toLowerCase().includes(search));
  renderMenus(filtered);
}

function filterSearch() {
  const search = document.getElementById('search-box').value.toLowerCase();
  let filtered = allMenuItems;
  if (currentCategory !== 'all') {
    filtered = filtered.filter(item => {
      const attr = item.attributes || item;
      return String(attr.category_id ?? attr.menu_category_id) === String(currentCategory);
    });
  }
  if (search) filtered = filtered.filter(i => (i.attributes?.menu_name||i.name||'').toLowerCase().includes(search));
  renderMenus(filtered);
}

// ─── CART ────────────────────────────────────────────────────────
function addToCart(itemJson) {
  const item = JSON.parse(itemJson);
  const existing = cart.find(c => c.id === item.id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...item, qty: 1 });
  }
  updateCartUI();
  showToast('✅ أضيف إلى السلة: ' + item.name, 'success');
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id == id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cart-count').textContent = count;

  const container = document.getElementById('cart-items');
  if (!cart.length) {
    container.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>سلتك فارغة</p></div>`;
  } else {
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div>
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${(item.price * item.qty).toFixed(2)} ₪</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      </div>`).join('');
  }

  document.getElementById('cart-total-price').textContent = total.toFixed(2) + ' ₪';
}

function toggleCart() {
  document.getElementById('cart-sidebar').classList.toggle('open');
  document.getElementById('cart-overlay').classList.toggle('open');
}

// ─── ORDER MODAL ─────────────────────────────────────────────────
function openOrderModal() {
  if (!cart.length) { showToast('❗ السلة فارغة', 'error'); return; }
  toggleCart();
  document.getElementById('order-modal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('order-modal').classList.remove('open');
}

function setOrderType(type, btn) {
  orderType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('address-group').style.display = type === 'delivery' ? 'block' : 'none';
}

// ─── SUBMIT ORDER ────────────────────────────────────────────────
async function submitOrder() {
  const firstName = document.getElementById('f-firstname').value.trim();
  const phone     = document.getElementById('f-phone').value.trim();

  if (!firstName) { showToast('❗ الاسم مطلوب', 'error'); return; }
  if (!phone)     { showToast('❗ رقم الهاتف مطلوب', 'error'); return; }

  const btn = document.getElementById('submit-order');
  btn.disabled = true;
  btn.textContent = '⏳ جارٍ الإرسال...';

  const payload = {
    first_name:  firstName,
    last_name:   document.getElementById('f-lastname').value.trim(),
    email:       document.getElementById('f-email').value.trim(),
    telephone:   phone,
    order_type:  orderType,
    comment:     document.getElementById('f-comment').value.trim(),
    menu_items:  cart.map(i => ({ menu_id: i.id, quantity: i.qty, comment: '' })),
  };

  try {
    const res = await fetch(`${API_BASE}?action=create_order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    if (json.success) {
      closeOrderModal();
      const orderId = json.data?.id || json.data?.order_id || '----';
      document.getElementById('order-number').textContent = '#' + orderId;
      document.getElementById('success-screen').classList.add('open');
      cart = [];
      updateCartUI();
    } else {
      showToast('❗ حدث خطأ: ' + (json.error || 'حاول مرة ثانية'), 'error');
    }
  } catch(e) {
    showToast('❗ فشل الاتصال بالسيرفر', 'error');
  }

  btn.disabled = false;
  btn.textContent = '🍽️ أرسل الطلب';
}

// ─── RESET ───────────────────────────────────────────────────────
function resetAll() {
  document.getElementById('success-screen').classList.remove('open');
  document.getElementById('f-firstname').value = '';
  document.getElementById('f-lastname').value  = '';
  document.getElementById('f-phone').value    = '';
  document.getElementById('f-email').value    = '';
  document.getElementById('f-comment').value  = '';
}

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}
