<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اطلب وجبتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:   #E63946;
    --brand2:  #FF6B35;
    --dark:    #1a1a2e;
    --card:    #16213e;
    --surface: #0f3460;
    --text:    #eaeaea;
    --muted:   #9ba3b4;
    --radius:  14px;
    --shadow:  0 8px 32px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand2) 100%);
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transition: background .5s;
  }
  .header-right h1 { font-size: 1.4rem; font-weight: 900; }
  .header-right span { font-size: .85rem; opacity: .85; }

  #cart-btn {
    background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.4);
    color: white; padding: 10px 18px; border-radius: 50px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: .95rem; font-weight: 700;
    backdrop-filter: blur(8px); transition: all .25s;
    display: flex; align-items: center; gap: 8px;
  }
  #cart-btn:hover { background: rgba(255,255,255,.35); transform: scale(1.04); }
  #cart-count {
    background: white; color: var(--brand); border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center;
    justify-content: center; font-size: .75rem; font-weight: 900;
  }

  #closed-banner {
    display: none;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white; text-align: center; padding: 14px;
    font-weight: 700; font-size: 1rem;
  }
  #closed-banner.show { display: block; }

  #categories-bar {
    display: flex; gap: 10px; padding: 16px 24px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--card); border-bottom: 1px solid rgba(255,255,255,.07);
  }
  #categories-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    white-space: nowrap; padding: 8px 20px; border-radius: 50px;
    background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.1);
    color: var(--muted); cursor: pointer; font-family: 'Cairo', sans-serif;
    font-size: .9rem; font-weight: 600; transition: all .2s;
  }
  .cat-chip:hover, .cat-chip.active { background: var(--brand); border-color: var(--brand); color: white; }

  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  #search-box {
    width: 100%; padding: 14px 20px; border-radius: var(--radius);
    border: 1.5px solid rgba(255,255,255,.12); background: var(--card);
    color: var(--text); font-family: 'Cairo', sans-serif; font-size: 1rem;
    margin-bottom: 28px; outline: none; transition: border-color .2s;
  }
  #search-box:focus { border-color: var(--brand); }
  #search-box::placeholder { color: var(--muted); }

  #menu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
  }
  .menu-card {
    background: var(--card); border-radius: var(--radius); overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.07); transition: transform .25s, box-shadow .25s;
    animation: fadeUp .4s ease both;
  }
  .menu-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: rgba(230,57,70,.4); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .card-img {
    width: 100%; height: 180px; object-fit: cover;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
  }
  .card-body { padding: 16px; }
  .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: .85rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-size: 1.2rem; font-weight: 900; color: var(--brand2); }
  .add-btn {
    background: var(--brand); color: white; border: none; padding: 9px 20px;
    border-radius: 50px; cursor: pointer; font-family: 'Cairo', sans-serif;
    font-size: .9rem; font-weight: 700; transition: all .2s;
  }
  .add-btn:hover { opacity: .85; transform: scale(1.05); }
  .add-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .add-btn.added { background: #27ae60; }

  #loader, #empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1.1rem; }
  .spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,.1); border-top-color: var(--brand); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CART */
  #cart-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:200; backdrop-filter:blur(4px); }
  #cart-overlay.open { display:block; }
  #cart-sidebar {
    position:fixed; top:0; left:-100%; width:min(420px,96vw); height:100vh;
    background:var(--card); z-index:300; display:flex; flex-direction:column;
    transition:left .35s cubic-bezier(.4,0,.2,1); box-shadow:8px 0 40px rgba(0,0,0,.6);
  }
  #cart-sidebar.open { left:0; }
  .cart-header {
    padding:22px 20px; background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:flex; align-items:center; justify-content:space-between;
  }
  .cart-header h2 { font-size:1.2rem; font-weight:800; }
  #close-cart { background:rgba(255,255,255,.2); border:none; color:white; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1.2rem; }
  #cart-items { flex:1; overflow-y:auto; padding:16px; }
  .cart-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; background:rgba(255,255,255,.05); border-radius:10px; margin-bottom:10px; gap:10px;
  }
  .cart-item-name { font-weight:700; font-size:.95rem; }
  .cart-item-price { color:var(--brand2); font-size:.9rem; margin-top:3px; }
  .qty-controls { display:flex; align-items:center; gap:8px; }
  .qty-btn { background:var(--surface); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:1rem; transition:background .2s; }
  .qty-btn:hover { background:var(--brand); }
  .qty-num { font-weight:700; min-width:20px; text-align:center; }
  .cart-empty { text-align:center; padding:40px 20px; color:var(--muted); }
  .cart-footer { padding:20px; border-top:1px solid rgba(255,255,255,.1); }
  .cart-total { display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; margin-bottom:16px; }
  .total-price { color:var(--brand2); font-size:1.3rem; }
  #checkout-btn {
    width:100%; padding:16px; background:linear-gradient(135deg,var(--brand),var(--brand2));
    border:none; border-radius:var(--radius); color:white;
    font-family:'Cairo',sans-serif; font-size:1.1rem; font-weight:800; cursor:pointer;
    transition: opacity .2s;
  }
  #checkout-btn:disabled { opacity:.5; cursor:not-allowed; }

  /* ORDER MODAL */
  #order-modal { display:none; position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:20px; }
  #order-modal.open { display:flex; }
  .modal-box { background:var(--card); border-radius:20px; width:min(480px,100%); max-height:90vh; overflow-y:auto; border:1.5px solid rgba(255,255,255,.1); box-shadow:var(--shadow); animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
  .modal-header { padding:22px 24px; background:linear-gradient(135deg,var(--brand),var(--brand2)); border-radius:18px 18px 0 0; display:flex; justify-content:space-between; align-items:center; }
  .modal-header h2 { font-size:1.15rem; font-weight:800; }
  #close-modal { background:rgba(255,255,255,.2); border:none; color:white; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem; }
  .modal-body { padding:24px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:.9rem; font-weight:700; color:var(--muted); margin-bottom:7px; }
  .form-group input, .form-group textarea {
    width:100%; padding:12px 16px; border-radius:10px;
    border:1.5px solid rgba(255,255,255,.1); background:var(--dark);
    color:var(--text); font-family:'Cairo',sans-serif; font-size:.95rem; outline:none; transition:border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color:var(--brand); }

  /* Order summary in modal */
  .order-summary { background:rgba(255,255,255,.04); border-radius:12px; padding:14px; margin-bottom:18px; }
  .order-summary-title { font-size:.85rem; color:var(--muted); margin-bottom:10px; font-weight:700; }
  .order-summary-item { display:flex; justify-content:space-between; font-size:.9rem; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05); }
  .order-summary-item:last-child { border:none; }
  .order-summary-total { display:flex; justify-content:space-between; font-size:1rem; font-weight:800; margin-top:10px; color:var(--brand2); }

  #submit-order {
    width:100%; padding:15px; background:linear-gradient(135deg,var(--brand),var(--brand2));
    border:none; border-radius:var(--radius); color:white;
    font-family:'Cairo',sans-serif; font-size:1.1rem; font-weight:800; cursor:pointer; margin-top:8px;
    transition: opacity .2s, transform .1s;
  }
  #submit-order:hover { opacity:.9; transform:scale(1.01); }
  #submit-order:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  /* SUCCESS */
  #success-screen { display:none; position:fixed; inset:0; z-index:500; background:var(--dark); align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:40px; }
  #success-screen.open { display:flex; }
  .success-icon { font-size:5rem; margin-bottom:24px; animation:bounce .6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  #success-screen h2 { font-size:1.8rem; font-weight:900; margin-bottom:12px; }
  #success-screen p  { color:var(--muted); font-size:1rem; margin-bottom:8px; }
  #order-number { color:var(--brand2); font-size:1.5rem; font-weight:900; background:rgba(255,107,53,.1); padding:10px 28px; border-radius:50px; display:inline-block; margin:8px 0; }
  #new-order-btn { margin-top:30px; padding:14px 36px; background:var(--brand); border:none; border-radius:50px; color:white; font-family:'Cairo',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; }

  /* TOAST */
  #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#2d2d2d; color:white; padding:12px 28px; border-radius:50px; font-size:.9rem; font-weight:700; z-index:999; transition:transform .3s,opacity .3s; opacity:0; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.success { background:#27ae60; }
  #toast.error   { background:#e74c3c; }

  /* Loading overlay */
  #submit-overlay { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.7); align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  #submit-overlay.open { display:flex; }
  #submit-overlay p { color:white; font-size:1.1rem; font-weight:700; }

  @media(max-width:600px) { main{padding:18px 14px} #menu-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))} }
</style>
</head>
<body>

<div id="closed-banner">🔴 المطعم مغلق حالياً — <span id="closed-msg-text"></span></div>

<header id="main-header">
  <div class="header-right">
    <h1 id="restaurant-title">🍽️ مطعمي</h1>
    <span id="restaurant-hours"></span>
  </div>
  <button id="cart-btn" onclick="toggleCart()">
    🛒 السلة <div id="cart-count">0</div>
  </button>
</header>

<div id="categories-bar">
  <button class="cat-chip active" data-cat="all" onclick="filterCategory('all',this)">الكل</button>
</div>

<main>
  <input type="text" id="search-box" placeholder="🔍  ابحث عن وجبتك..." oninput="filterSearch()">
  <div id="loader"><div class="spinner"></div>جارٍ تحميل القائمة...</div>
  <div id="menu-grid" style="display:none"></div>
  <div id="empty-state" style="display:none">لم يتم العثور على أصناف 😕</div>
</main>

<!-- CART -->
<div id="cart-overlay" onclick="toggleCart()"></div>
<div id="cart-sidebar">
  <div class="cart-header">
    <h2>🛒 سلة الطلبات</h2>
    <button id="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div id="cart-items">
    <div class="cart-empty"><div style="font-size:2.5rem">🛒</div><p>سلتك فارغة</p></div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>الإجمالي:</span>
      <span class="total-price" id="cart-total-price">0.00 د</span>
    </div>
    <button id="checkout-btn" onclick="openOrderModal()">تأكيد الطلب ←</button>
  </div>
</div>

<!-- ORDER MODAL -->
<div id="order-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>📋 تفاصيل الطلب</h2>
      <button id="close-modal" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="order-summary" id="order-summary"></div>
      <div class="form-group">
        <label>الاسم الكامل *</label>
        <input type="text" id="f-name" placeholder="أحمد محمد" autocomplete="name">
      </div>
      <div class="form-group">
        <label>رقم الهاتف *</label>
        <input type="tel" id="f-phone" placeholder="07XXXXXXXX" autocomplete="tel">
      </div>
      <div class="form-group">
        <label>ملاحظات إضافية</label>
        <textarea id="f-comment" rows="3" placeholder="أي طلبات خاصة؟"></textarea>
      </div>
      <button id="submit-order" onclick="submitOrder()">🍽️ أرسل الطلب</button>
    </div>
  </div>
</div>

<!-- SUBMIT LOADING -->
<div id="submit-overlay">
  <div class="spinner"></div>
  <p>⏳ جارٍ إرسال طلبك...</p>
</div>

<!-- SUCCESS -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <h2>تم استلام طلبك!</h2>
  <p>رقم طلبك:</p>
  <div id="order-number">#----</div>
  <p style="margin-top:12px;color:#9ba3b4">سيتم التواصل معك قريباً 🙏</p>
  <button id="new-order-btn" onclick="resetAll()">🍔 طلب جديد</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const API = 'https://rohan-exceptive-antonio.ngrok-free.dev/api';

// Get restaurantId from URL or default to 1
const urlParams   = new URLSearchParams(window.location.search);
const RESTAURANT_ID = parseInt(urlParams.get('restaurantId') || urlParams.get('RestaurantId') || '1');

function apiFetch(url, options = {}) {
  options.headers = options.headers || {};
  options.headers['ngrok-skip-browser-warning'] = 'true';
  if (options.headers['Content-Type'] === undefined && options.method && options.method !== 'GET') {
    options.headers['Content-Type'] = 'application/json';
  }
  return fetch(url, options);
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let allMenuItems    = [];
let cart            = [];
let currentCategory = 'all';
let restaurantOpen  = true;
let restaurantSettings = {};

// ═══════════════════════════════════════════════════
//  SOUND — صوت مميز عند إضافة للسلة
// ═══════════════════════════════════════════════════
function playAddSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784]; // C E G - chord
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime + i * 0.08);
      g.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.25);
      o.start(ctx.currentTime + i * 0.08);
      o.stop(ctx.currentTime + i * 0.08 + 0.3);
    });
  } catch(e) {}
}

function playOrderSuccess() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Victory fanfare
    const melody = [
      {f:523, t:0,    d:0.15},
      {f:523, t:0.16, d:0.15},
      {f:523, t:0.32, d:0.15},
      {f:659, t:0.48, d:0.4},
      {f:622, t:0.52, d:0.1},
      {f:587, t:0.64, d:0.1},
      {f:523, t:0.80, d:0.4},
      {f:392, t:0.96, d:0.2},
      {f:659, t:1.20, d:0.6},
    ];
    melody.forEach(n => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.value = n.f;
      g.gain.setValueAtTime(0, ctx.currentTime + n.t);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + n.t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + n.t + n.d);
      o.start(ctx.currentTime + n.t);
      o.stop(ctx.currentTime + n.t + n.d + 0.05);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
(async function init() {
  await loadSettings();
  await loadMenuItems();
  // Auto-refresh menu every 60 seconds
  setInterval(loadMenuItems, 60000);
  // Auto-refresh status every 30 seconds
  setInterval(checkOpenStatus, 30000);
})();

// ═══════════════════════════════════════════════════
//  LOAD SETTINGS
// ═══════════════════════════════════════════════════
async function loadSettings() {
  try {
    const res = await apiFetch(`${API}/RestaurantSettings`);
    if (!res.ok) throw new Error('settings failed');
    const s = await res.json();
    restaurantSettings = s;

    const name = s.restaurantName || s.name || 'مطعمي';
    document.getElementById('restaurant-title').textContent = '🍽️ ' + name;
    document.title = 'اطلب من ' + name;

    const c1 = s.primaryColor   || s.PrimaryColor   || '#E63946';
    const c2 = s.secondaryColor || s.SecondaryColor  || '#FF6B35';
    document.documentElement.style.setProperty('--brand',  c1);
    document.documentElement.style.setProperty('--brand2', c2);

    const openT  = s.openTime  || s.OpenTime  || '10:00';
    const closeT = s.closeTime || s.CloseTime || '23:00';
    document.getElementById('restaurant-hours').textContent = `⏰ ${openT} - ${closeT}`;

    await checkOpenStatus();
  } catch(e) {
    console.warn('Settings not loaded, using defaults');
  }
}

async function checkOpenStatus() {
  try {
    const res2 = await apiFetch(`${API}/RestaurantSettings/isopen`);
    if (!res2.ok) throw new Error('isopen failed');
    const status = await res2.json();
    restaurantOpen = status.isOpen !== undefined ? status.isOpen : status.IsOpen;

    if (!restaurantOpen) {
      document.getElementById('closed-banner').classList.add('show');
      document.getElementById('closed-msg-text').textContent =
        status.message || status.Message ||
        restaurantSettings.closedMessage || 'يرجى المحاولة خلال أوقات العمل';
      document.getElementById('checkout-btn').disabled = true;
      document.querySelectorAll('.add-btn').forEach(b => b.disabled = true);
    } else {
      document.getElementById('closed-banner').classList.remove('show');
      document.getElementById('checkout-btn').disabled = false;
      document.querySelectorAll('.add-btn').forEach(b => b.disabled = false);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  LOAD MENU
// ═══════════════════════════════════════════════════
async function loadMenuItems() {
  try {
    const res = await apiFetch(`${API}/MenuItems?restaurantId=${RESTAURANT_ID}`);
    if (!res.ok) throw new Error('menu failed ' + res.status);
    const data = await res.json();

    // Normalize field names
    allMenuItems = data
      .map(i => ({
        menuItemId:  i.menuItemId  || i.MenuItemId  || i.id,
        name:        i.name        || i.Name        || i.menuName || '؟',
        description: i.description || i.Description || '',
        price:       parseFloat(i.price || i.Price || 0),
        category:    i.category    || i.Category    || '',
        imageUrl:    i.imageUrl    || i.ImageUrl     || '',
        isAvailable: i.isAvailable !== false && i.IsAvailable !== false,
      }))
      .filter(i => i.isAvailable);

    // Build categories
    const cats = [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
    const bar   = document.getElementById('categories-bar');
    // Clear old dynamic chips
    bar.querySelectorAll('[data-dynamic]').forEach(b => b.remove());
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className   = 'cat-chip';
      btn.textContent = cat;
      btn.setAttribute('data-dynamic', '1');
      btn.onclick = () => filterCategory(cat, btn);
      bar.appendChild(btn);
    });

    document.getElementById('loader').style.display = 'none';
    document.getElementById('menu-grid').style.display = 'grid';
    renderMenus(allMenuItems);
  } catch(e) {
    console.error('Menu load error:', e);
    document.getElementById('loader').innerHTML =
      '<p style="color:#e74c3c">⚠️ تعذر تحميل القائمة — تأكد من الاتصال بالإنترنت</p>';
  }
}

// ═══════════════════════════════════════════════════
//  RENDER MENU
// ═══════════════════════════════════════════════════
const EMOJIS = ['🍔','🍕','🍗','🥗','🌮','🍜','🥪','🍣','🥩','🍱','🧆','🥙'];

function renderMenus(items) {
  const grid  = document.getElementById('menu-grid');
  const empty = document.getElementById('empty-state');
  if (!items.length) { grid.style.display='none'; empty.style.display='block'; return; }
  empty.style.display='none'; grid.style.display='grid';

  grid.innerHTML = items.map((item, i) => {
    const emoji  = EMOJIS[i % EMOJIS.length];
    const imgTag = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.name}" style="width:100%;height:180px;object-fit:cover" onerror="this.outerHTML='<div class=card-img>${emoji}</div>'">`
      : `<div class="card-img">${emoji}</div>`;
    const disabled = !restaurantOpen ? 'disabled title="المطعم مغلق"' : '';
    return `
      <div class="menu-card" style="animation-delay:${i*.05}s">
        ${imgTag}
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description || 'وجبة شهية مميزة'}</div>
          <div class="card-footer">
            <div class="card-price">${item.price.toFixed(2)} د</div>
            <button class="add-btn" ${disabled}
              onclick="addToCart(${item.menuItemId},'${escHtml(item.name)}',${item.price})">
              + أضف
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/'/g, "&#39;").replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════
function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterSearch() { applyFilters(); }

function applyFilters() {
  const s = document.getElementById('search-box').value.toLowerCase().trim();
  let filtered = currentCategory === 'all'
    ? allMenuItems
    : allMenuItems.filter(i => i.category === currentCategory);
  if (s) filtered = filtered.filter(i =>
    i.name.toLowerCase().includes(s) || (i.description||'').toLowerCase().includes(s)
  );
  renderMenus(filtered);
}

// ═══════════════════════════════════════════════════
//  CART
// ═══════════════════════════════════════════════════
function addToCart(id, name, price) {
  if (!restaurantOpen) { showToast('❗ المطعم مغلق حالياً', 'error'); return; }
  const ex = cart.find(c => c.id === id);
  if (ex) {
    ex.qty++;
  } else {
    cart.push({ id, name, price, qty: 1 });
  }
  updateCartUI();
  playAddSound();
  showToast('✅ أضيف: ' + name, 'success');

  // Visual feedback on button
  const btns = document.querySelectorAll('.add-btn');
  btns.forEach(btn => {
    if (btn.onclick && btn.onclick.toString().includes(`addToCart(${id},`)) {
      btn.textContent = '✓ أضيف';
      btn.classList.add('added');
      setTimeout(() => { btn.textContent = '+ أضف'; btn.classList.remove('added'); }, 1200);
    }
  });
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id == id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = count;

  const container = document.getElementById('cart-items');
  container.innerHTML = !cart.length
    ? `<div class="cart-empty"><div style="font-size:2.5rem">🛒</div><p>سلتك فارغة</p></div>`
    : cart.map(item => `
        <div class="cart-item">
          <div style="flex:1">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${(item.price * item.qty).toFixed(2)} د</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>`).join('');

  document.getElementById('cart-total-price').textContent = total.toFixed(2) + ' د';
  document.getElementById('checkout-btn').disabled = !cart.length || !restaurantOpen;
}

function toggleCart() {
  document.getElementById('cart-sidebar').classList.toggle('open');
  document.getElementById('cart-overlay').classList.toggle('open');
}

// ═══════════════════════════════════════════════════
//  ORDER MODAL
// ═══════════════════════════════════════════════════
function openOrderModal() {
  if (!restaurantOpen) { showToast('❗ المطعم مغلق حالياً', 'error'); return; }
  if (!cart.length)    { showToast('❗ السلة فارغة', 'error'); return; }

  // Show order summary
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('order-summary').innerHTML = `
    <div class="order-summary-title">📋 ملخص طلبك</div>
    ${cart.map(i => `
      <div class="order-summary-item">
        <span>${i.name} × ${i.qty}</span>
        <span>${(i.price * i.qty).toFixed(2)} د</span>
      </div>`).join('')}
    <div class="order-summary-total">
      <span>الإجمالي</span>
      <span>${total.toFixed(2)} د</span>
    </div>`;

  toggleCart();
  document.getElementById('order-modal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('order-modal').classList.remove('open');
}

// ═══════════════════════════════════════════════════
//  SUBMIT ORDER — الجزء الأهم
// ═══════════════════════════════════════════════════
async function submitOrder() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const notes = document.getElementById('f-comment').value.trim();

  if (!name)  { showToast('❗ الاسم مطلوب', 'error'); document.getElementById('f-name').focus(); return; }
  if (!phone) { showToast('❗ رقم الهاتف مطلوب', 'error'); document.getElementById('f-phone').focus(); return; }
  if (phone.length < 5) { showToast('❗ رقم الهاتف غير صحيح', 'error'); return; }

  const btn = document.getElementById('submit-order');
  btn.disabled = true;
  document.getElementById('submit-overlay').classList.add('open');

  try {
    // 1) إنشاء أو جلب العميل
    const customerId = await getOrCreateCustomer(name, phone);

    // 2) إنشاء الطلب — بالحقول الصحيحة من API
    const totalAmount = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const orderBody = {
      customerId:   customerId,
      restaurantId: RESTAURANT_ID,
      totalAmount:  totalAmount,
      status:       'Placed',
      notes:        notes || null,
    };

    const orderRes = await apiFetch(`${API}/Orders`, {
      method: 'POST',
      body:   JSON.stringify(orderBody),
    });

    if (!orderRes.ok) {
      const errText = await orderRes.text();
      console.error('Order error:', orderRes.status, errText);
      throw new Error('Order failed: ' + orderRes.status);
    }

    const order = await orderRes.json();
    // API returns camelCase: orderId
    const orderId = order.orderId || order.OrderId || order.id || '?';

    // 3) إضافة الأصناف
    for (const item of cart) {
      const itemBody = {
        orderId:    orderId,
        menuItemId: item.id,
        quantity:   item.qty,
        unitPrice:  item.price,
      };
      const itemRes = await apiFetch(`${API}/OrderItems`, {
        method: 'POST',
        body:   JSON.stringify(itemBody),
      });
      if (!itemRes.ok) {
        console.warn('OrderItem failed:', await itemRes.text());
      }
    }

    // SUCCESS
    document.getElementById('submit-overlay').classList.remove('open');
    closeOrderModal();
    document.getElementById('order-number').textContent = '#' + orderId;
    document.getElementById('success-screen').classList.add('open');
    playOrderSuccess();
    cart = [];
    updateCartUI();

  } catch(e) {
    console.error('Submit error:', e);
    document.getElementById('submit-overlay').classList.remove('open');
    showToast('❗ فشل إرسال الطلب — تأكد من الاتصال', 'error');
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════
//  GET OR CREATE CUSTOMER
// ═══════════════════════════════════════════════════
async function getOrCreateCustomer(name, phone) {
  try {
    // Search existing customers by restaurantId
    const res = await apiFetch(`${API}/Customers?restaurantId=${RESTAURANT_ID}`);
    if (res.ok) {
      const list = await res.json();
      // Find by phone number
      const found = list.find(c =>
        (c.phoneNumber || c.PhoneNumber || c.phone || '') === phone
      );
      if (found) {
        return found.customerId || found.CustomerId;
      }
    }
  } catch(e) { console.warn('Customer search failed', e); }

  // Create new customer
  try {
    const body = {
      fullName:     name,
      phoneNumber:  phone,
      restaurantId: RESTAURANT_ID,
    };
    const cr = await apiFetch(`${API}/Customers`, {
      method: 'POST',
      body:   JSON.stringify(body),
    });
    if (!cr.ok) {
      const errText = await cr.text();
      console.error('Customer create error:', cr.status, errText);
      // Try alternative field names
      const body2 = { fullUsername: name, Password: phone, restaurantId: RESTAURANT_ID };
      const cr2 = await apiFetch(`${API}/Customers`, {
        method: 'POST',
        body:   JSON.stringify(body2),
      });
      if (cr2.ok) {
        const cust2 = await cr2.json();
        return cust2.customerId || cust2.CustomerId || 1;
      }
      return 1;
    }
    const cust = await cr.json();
    return cust.customerId || cust.CustomerId || 1;
  } catch(e) {
    console.error('Customer create exception:', e);
    return 1;
  }
}

// ═══════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════
function resetAll() {
  document.getElementById('success-screen').classList.remove('open');
  ['f-name', 'f-phone', 'f-comment'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastT;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = '', 3000);
}
</script>
