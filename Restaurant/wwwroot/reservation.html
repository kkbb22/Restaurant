<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز طاولة - مطعمي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .booking-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-top: 50px;
        }

        .table-card {
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

            .table-card:hover {
                transform: translateY(-5px);
                border-color: #667eea;
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            }

            .table-card.selected {
                border-color: #28a745;
                background: #f0fff0;
            }

        .time-slot {
            cursor: pointer;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            margin: 5px;
        }

            .time-slot:hover {
                background: #667eea;
                color: white;
            }

            .time-slot.selected {
                background: #28a745;
                color: white;
            }

        .step {
            display: none;
        }

            .step.active {
                display: block;
            }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 0 5px;
        }

            .step-item.active {
                background: #667eea;
                color: white;
            }

            .step-item.completed {
                background: #28a745;
                color: white;
            }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

            .btn-primary:hover {
                background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- شريط التحميل -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="booking-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2>
                            <i class="fas fa-calendar-alt ms-2"></i>
                            حجز طاولة
                        </h2>
                        <a href="/index.html" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-right me-2"></i>
                            العودة للرئيسية
                        </a>
                    </div>

                    <!-- Step Indicator -->
                    <div class="step-indicator">
                        <div class="step-item active" id="step1-indicator">1. اختيار التاريخ</div>
                        <div class="step-item" id="step2-indicator">2. اختيار الطاولة</div>
                        <div class="step-item" id="step3-indicator">3. بيانات العميل</div>
                        <div class="step-item" id="step4-indicator">4. تأكيد الحجز</div>
                    </div>

                    <!-- Step 1: اختيار التاريخ والوقت -->
                    <div class="step active" id="step1">
                        <h4>اختر تاريخ ووقت الحجز</h4>
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <label class="form-label">التاريخ</label>
                                <input type="date" class="form-control" id="reservationDate"
                                       min="" onchange="checkDateTime()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">عدد الضيوف</label>
                                <input type="number" class="form-control" id="numberOfGuests" min="1" max="20" value="2" onchange="checkDateTime()">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <label class="form-label">اختر الوقت</label>
                                <div class="row" id="timeSlots">
                                    <!-- time slots will be loaded here -->
                                </div>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button class="btn btn-primary" onclick="nextStep(2)" id="nextToStep2" disabled>
                                التالي
                                <i class="fas fa-arrow-left ms-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Step 2: اختيار الطاولة -->
                    <div class="step" id="step2">
                        <h4>اختر الطاولة المناسبة</h4>
                        <div class="row mt-4" id="tablesList">
                            <!-- tables will be loaded here -->
                        </div>
                        <div class="text-center mt-4">
                            <button class="btn btn-secondary" onclick="prevStep(1)">
                                <i class="fas fa-arrow-right me-2"></i>
                                السابق
                            </button>
                            <button class="btn btn-primary" onclick="nextStep(3)" id="nextToStep3" disabled>
                                التالي
                                <i class="fas fa-arrow-left ms-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Step 3: بيانات العميل -->
                    <div class="step" id="step3">
                        <h4>أدخل بياناتك</h4>
                        <div class="mt-4">
                            <div class="mb-3">
                                <label class="form-label">الاسم الكامل</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">رقم الهاتف</label>
                                <input type="text" class="form-control" id="customerPhone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">البريد الإلكتروني (اختياري)</label>
                                <input type="email" class="form-control" id="customerEmail">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ملاحظات خاصة</label>
                                <textarea class="form-control" id="specialRequests" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button class="btn btn-secondary" onclick="prevStep(2)">
                                <i class="fas fa-arrow-right me-2"></i>
                                السابق
                            </button>
                            <button class="btn btn-primary" onclick="nextStep(4)">
                                التالي
                                <i class="fas fa-arrow-left ms-2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Step 4: تأكيد الحجز -->
                    <div class="step" id="step4">
                        <h4>تأكيد الحجز</h4>
                        <div class="card mt-4">
                            <div class="card-body">
                                <h5>تفاصيل الحجز</h5>
                                <table class="table table-borderless">
                                    <tr>
                                        <td><strong>التاريخ:</strong></td>
                                        <td id="confirmDate"></td>
                                    </tr>
                                    <tr>
                                        <td><strong>الوقت:</strong></td>
                                        <td id="confirmTime"></td>
                                    </tr>
                                    <tr>
                                        <td><strong>عدد الضيوف:</strong></td>
                                        <td id="confirmGuests"></td>
                                    </tr>
                                    <tr>
                                        <td><strong>الطاولة:</strong></td>
                                        <td id="confirmTable"></td>
                                    </tr>
                                    <tr>
                                        <td><strong>الاسم:</strong></td>
                                        <td id="confirmName"></td>
                                    </tr>
                                    <tr>
                                        <td><strong>رقم الهاتف:</strong></td>
                                        <td id="confirmPhone"></td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button class="btn btn-secondary" onclick="prevStep(3)">
                                <i class="fas fa-arrow-right me-2"></i>
                                السابق
                            </button>
                            <button class="btn btn-success" onclick="confirmReservation()">
                                <i class="fas fa-check ms-2"></i>
                                تأكيد الحجز
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'https://localhost:7122/api';  // نفس الرقم (7122)
        let selectedDate = '';
        let selectedTime = '';
        let selectedTable = null;

        // Set min date to today
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reservationDate').min = today;
            loadTimeSlots();
        });

        // Load time slots
        function loadTimeSlots() {
            const times = ['12:00', '12:30', '13:00', '13:30', '14:00', '19:00', '19:30', '20:00', '20:30', '21:00'];
            const slotsContainer = document.getElementById('timeSlots');
            slotsContainer.innerHTML = times.map(time => `
                <div class="col-3">
                    <div class="time-slot" onclick="selectTime('${time}')">
                        ${time}
                    </div>
                </div>
            `).join('');
        }

        // Check date and time
        function checkDateTime() {
            const date = document.getElementById('reservationDate').value;
            const time = selectedTime;
            const guests = document.getElementById('numberOfGuests').value;

            if (date && time && guests) {
                document.getElementById('nextToStep2').disabled = false;
            } else {
                document.getElementById('nextToStep2').disabled = true;
            }
        }

        // Select time
        function selectTime(time) {
            selectedTime = time;
            document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
            checkDateTime();
        }

        // Load available tables
        async function loadAvailableTables() {
            const guests = document.getElementById('numberOfGuests').value;
            const date = document.getElementById('reservationDate').value;

            if (!date || !selectedTime) return;

            showLoading();
            try {
                const response = await fetch(
                    `${API_BASE}/Reservations/AvailableTables?date=${date}&time=${selectedTime}:00&guests=${guests}`
                );
                const tables = await response.json();

                const tablesContainer = document.getElementById('tablesList');
                if (tables.length === 0) {
                    tablesContainer.innerHTML = '<div class="col-12"><div class="alert alert-warning">لا توجد طاولات متوفرة في هذا الوقت</div></div>';
                } else {
                    tablesContainer.innerHTML = tables.map(table => `
                        <div class="col-md-6">
                            <div class="table-card" onclick="selectTable(${table.tableId}, ${table.tableNumber})">
                                <i class="fas fa-chair fa-3x mb-2" style="color: #667eea;"></i>
                                <h5>طاولة رقم ${table.tableNumber}</h5>
                                <p>تسع حتى ${table.capacity} أشخاص</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading tables:', error);
                alert('حدث خطأ في تحميل الطاولات');
            } finally {
                hideLoading();
            }
        }

        // Select table
        function selectTable(tableId, tableNumber) {
            selectedTable = { id: tableId, number: tableNumber };
            document.querySelectorAll('.table-card').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('nextToStep3').disabled = false;
        }

        // Show loading
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // Next step
        function nextStep(step) {
            if (step === 2) {
                loadAvailableTables();
            } else if (step === 4) {
                document.getElementById('confirmDate').innerText =
                    document.getElementById('reservationDate').value;
                document.getElementById('confirmTime').innerText = selectedTime;
                document.getElementById('confirmGuests').innerText =
                    document.getElementById('numberOfGuests').value;
                document.getElementById('confirmTable').innerText =
                    `طاولة رقم ${selectedTable.number}`;
                document.getElementById('confirmName').innerText =
                    document.getElementById('customerName').value;
                document.getElementById('confirmPhone').innerText =
                    document.getElementById('customerPhone').value;
            }

            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');

            document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}-indicator`).classList.add('active');
        }

        // Previous step
        function prevStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');

            document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}-indicator`).classList.add('active');
        }

        // Confirm reservation
        async function confirmReservation() {
            showLoading();

            try {
                // First create customer
                const customerData = {
                    fullName: document.getElementById('customerName').value,
                    phoneNumber: document.getElementById('customerPhone').value,
                    email: document.getElementById('customerEmail').value || null
                };

                const customerResponse = await fetch(`${API_BASE}/Customers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(customerData)
                });

                if (!customerResponse.ok) {
                    throw new Error('فشل في إضافة العميل');
                }

                const customer = await customerResponse.json();
                const customerId = customer.customerId || customer.id;

                // Create reservation
                const reservationData = {
                    customerId: customerId,
                    tableId: selectedTable.id,
                    reservationDate: document.getElementById('reservationDate').value,
                    reservationTime: selectedTime + ':00',
                    numberOfGuests: parseInt(document.getElementById('numberOfGuests').value),
                    specialRequests: document.getElementById('specialRequests').value || '',
                    status: 'Pending'
                };

                const reservationResponse = await fetch(`${API_BASE}/Reservations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(reservationData)
                });

                const result = await reservationResponse.json();

                if (reservationResponse.ok) {
                    alert('✅ تم الحجز بنجاح!');
                    window.location.href = '/index.html';
                } else {
                    alert('❌ حدث خطأ: ' + (result.message || 'فشل الحجز'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ حدث خطأ في الاتصال بالسيرفر');
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
</html>
